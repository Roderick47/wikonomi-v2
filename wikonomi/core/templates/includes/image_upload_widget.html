<label class="block text-sm font-medium text-gray-700 mb-1">{{ image_label|default:"Photo (Optional)" }}</label>
{% if enable_clear_image %}
    <input type="hidden" name="clear_image" id="clear_image" value="0">
{% endif %}
{{ form.image }}

<div class="mt-1 border-2 border-gray-300 border-dashed rounded-md relative hover:bg-gray-50 transition-colors duration-200" id="image-drop-zone">
    <div class="px-6 pt-8 pb-8 text-center {% if current_image %}hidden{% endif %}" id="image-upload-content">
        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>

        <div class="flex flex-col sm:flex-row justify-center gap-3 mt-2">
            <button type="button" onclick="openFilePicker(false)" class="inline-flex items-center justify-center px-4 py-2 border border-brand-purple text-sm font-medium rounded-md text-brand-purple bg-white hover:bg-brand-purple hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-purple">
                <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Choose from Files
            </button>

            <button type="button" onclick="openFilePicker(true)" class="inline-flex items-center justify-center px-4 py-2 border border-brand-purple text-sm font-medium rounded-md text-white bg-brand-purple hover:bg-brand-purple/90 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-purple">
                <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Take Photo
            </button>
        </div>
        <p class="mt-4 text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
        <p class="mt-1 text-xs text-gray-400">or drag and drop here</p>
    </div>

    <div id="image-preview-wrap" class="relative w-full p-2 {% if not current_image %}hidden{% endif %}">
        <img id="image-preview" src="{% if current_image %}{{ current_image.url }}{% endif %}" class="w-full h-64 object-contain rounded-md" alt="{% if current_image_alt %}{{ current_image_alt }}{% else %}Uploaded image preview{% endif %}" />

        <div class="absolute top-4 right-4 flex gap-2">
            <button type="button" onclick="openFilePicker(false)" class="bg-white/90 text-gray-700 p-2.5 rounded-full hover:bg-white shadow-sm hover:shadow transition-all backdrop-blur-sm" title="Change Photo">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </button>
            <button type="button" id="image-clear-btn" class="bg-red-500/90 text-white p-2.5 rounded-full hover:bg-red-600 shadow-sm hover:shadow transition-all backdrop-blur-sm" title="Remove Photo">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
    </div>
</div>
