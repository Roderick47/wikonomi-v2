<a href="{% url 'guides:detail' guide.slug %}" class="group block overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:border-brand-purple/25 hover:shadow-md">
    <div class="aspect-[16/9] overflow-hidden bg-gradient-to-br from-brand-purple/10 via-slate-50 to-brand-blue/15">
        {% if guide.photo %}
            <img src="{{ guide.photo.url }}" alt="{{ guide.title }}" class="h-full w-full object-cover transition duration-300 group-hover:scale-[1.02]" loading="lazy">
        {% else %}
            <div class="flex h-full items-center justify-center text-brand-purple/40" aria-hidden="true">
                <svg class="h-12 w-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18s-3.332.477-4.5 1.253"/></svg>
            </div>
        {% endif %}
    </div>
    <div class="p-4">
        <div class="mb-2 flex flex-wrap gap-1.5 text-xs font-medium text-slate-500">
            {% if guide.category %}<span class="rounded-full bg-brand-purple/8 px-2 py-1 text-brand-purple">{{ guide.category.name }}</span>{% endif %}
            {% if guide.organization %}<span class="px-1 py-1">{{ guide.organization.name }}</span>{% endif %}
        </div>
        <h3 class="line-clamp-2 text-base font-bold leading-snug text-slate-900 group-hover:text-brand-purple">{{ guide.title }}</h3>
        {% if guide.summary %}<p class="mt-2 line-clamp-2 text-sm leading-5 text-slate-600">{{ guide.summary }}</p>{% endif %}
        <span class="mt-3 inline-flex items-center text-sm font-semibold text-brand-purple">Read guide <span class="ml-1 transition group-hover:translate-x-0.5">→</span></span>
    </div>
</a>
