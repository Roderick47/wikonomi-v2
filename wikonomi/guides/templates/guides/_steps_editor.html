<section class="guide-form-card">
    <span class="guide-form-number">5</span>
    <div class="min-w-0 flex-1">
        <h2 class="guide-form-label">Add the steps</h2>
        <p class="guide-form-help">Keep each step focused on one action. You can reorder steps and attach supporting photos.</p>
        <div id="steps-editor" class="mt-5 flex flex-col" data-steps-editor>
            {% for step in steps %}<div class="step-row" data-step-row draggable="true" data-step-id="{{ step.id }}" data-position="{{ step.position }}"><button type="button" data-drag-handle aria-label="Reorder step" class="step-drag">⋮⋮</button><div class="step-number" data-step-number>{{ forloop.counter }}</div><div class="min-w-0 flex-1 space-y-3"><input type="text" data-step-title value="{{ step.title }}" maxlength="120" placeholder="Step title" class="guide-step-input font-semibold"><textarea data-step-instruction rows="3" placeholder="Explain what to do..." class="guide-step-input resize-y">{{ step.instruction }}</textarea><label class="inline-flex cursor-pointer items-center gap-2 text-xs font-bold text-brand-purple"><span>📷 Add photos</span><input type="file" data-step-photo-input accept="image/*" multiple class="hidden"></label></div><button type="button" data-delete-step aria-label="Remove step" class="step-delete">×</button></div><div class="step-insert"><button type="button" data-insert-after>+ Add step here</button></div>{% endfor %}
        </div>
        <template id="step-row-template"><div class="step-row" data-step-row draggable="true" data-position=""><button type="button" data-drag-handle aria-label="Reorder step" class="step-drag">⋮⋮</button><div class="step-number" data-step-number>+</div><div class="min-w-0 flex-1 space-y-3"><input type="text" data-step-title maxlength="120" placeholder="Step title" class="guide-step-input font-semibold"><textarea data-step-instruction rows="3" placeholder="Explain what to do..." class="guide-step-input resize-y"></textarea><label class="inline-flex cursor-pointer items-center gap-2 text-xs font-bold text-brand-purple"><span>📷 Add photos</span><input type="file" data-step-photo-input accept="image/*" multiple class="hidden"></label></div><button type="button" data-delete-step aria-label="Remove step" class="step-delete">×</button></div><div class="step-insert"><button type="button" data-insert-after>+ Add step here</button></div></template>
    </div>
</section>
